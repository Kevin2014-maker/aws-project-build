version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.8
    commands:
      - echo Installing dependencies...
      - pip install pytest

  pre_build:
    commands:
      - mkdir -p reports

  build:
    commands:
      - echo Running unit tests with pytest...
      - pytest --junitxml=reports/results.xml --tb=short

  post_build:
    commands:
      - echo Build completed successfully.

reports:
  pytest_reports:
    files:
      - reports/results.xml
    discard-paths: yes